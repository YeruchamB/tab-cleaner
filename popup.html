<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=340">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');

    :root {
      --bg: #0b0f1a;
      --surface: #141929;
      --surface-hover: #1c2238;
      --border: #232b42;
      --text: #e4e8f1;
      --text-dim: #7a829e;
      --zoom-blue: #2d8cff;
      --zoom-glow: rgba(45, 140, 255, 0.25);
      --danger: #ff4d6a;
      --danger-glow: rgba(255, 77, 106, 0.3);
      --success: #34d399;
      --amber: #f59e0b;
      --amber-glow: rgba(245, 158, 11, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, var(--zoom-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--zoom-blue), #0066e0);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px var(--zoom-glow);
      flex-shrink: 0;
    }

    .logo svg { width: 20px; height: 20px; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.3;
    }

    /* Summary card */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .summary-rows {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .summary-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .summary-label .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.red    { background: var(--danger); }
    .dot.amber  { background: var(--amber); }
    .dot.dim    { background: var(--text-dim); opacity: 0.4; }
    .dot.blue   { background: var(--zoom-blue); }

    .summary-value {
      font-size: 14px;
      font-weight: 700;
      min-width: 24px;
      text-align: right;
    }

    .summary-value.active { color: var(--text); }
    .summary-value.zero   { color: var(--text-dim); opacity: 0.4; }

    .summary-divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    .summary-total {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .summary-total .val {
      font-size: 16px;
    }

    /* Tab detail list */
    .tab-list {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 130px;
      overflow-y: auto;
    }

    .tab-list::-webkit-scrollbar { width: 4px; }
    .tab-list::-webkit-scrollbar-track { background: transparent; }
    .tab-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      background: var(--bg);
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
    }

    .tab-item .icon-tag {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .icon-tag.zoom  { background: rgba(255,77,106,0.15); color: var(--danger); }
    .icon-tag.dupe  { background: rgba(245,158,11,0.15); color: var(--amber); }
    .icon-tag.empty { background: rgba(122,130,158,0.15); color: var(--text-dim); }

    .tab-item .title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* Action button */
    .action-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .action-btn.go {
      background: linear-gradient(135deg, var(--zoom-blue), #0066e0);
      color: white;
      box-shadow: 0 4px 20px var(--zoom-glow);
    }

    .action-btn.go:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px var(--zoom-glow);
    }

    .action-btn:active { transform: translateY(0); }

    .action-btn.disabled {
      background: var(--surface);
      color: var(--text-dim);
      cursor: default;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .action-btn.disabled:hover { transform: none; }

    /* Success */
    .success-message {
      text-align: center;
      padding: 6px 0 2px;
      font-size: 12px;
      color: var(--success);
      font-weight: 600;
      opacity: 0;
      height: 0;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .success-message.visible {
      opacity: 1;
      height: 24px;
    }

    /* Scanning */
    .scanning {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 20px 0;
      font-size: 12px;
      color: var(--text-dim);
    }

    .scanning.active { display: flex; }

    .scan-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--zoom-blue);
      animation: pulse 1s infinite ease-in-out;
    }

    .scan-dot:nth-child(2) { animation-delay: 0.15s; }
    .scan-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 6.5C3 5.67 3.67 5 4.5 5H14.5C15.33 5 16 5.67 16 6.5V15.5C16 16.33 15.33 17 14.5 17H4.5C3.67 17 3 16.33 3 15.5V6.5Z" fill="white"/>
          <path d="M17.5 8.5L21 6V16L17.5 13.5V8.5Z" fill="white"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Tab Cleaner</h1>
        <p>Zoom · duplicates · empties · reorder</p>
      </div>
    </div>

    <div class="scanning active" id="scanning">
      <span class="scan-dot"></span>
      <span class="scan-dot"></span>
      <span class="scan-dot"></span>
      <span>Scanning tabs…</span>
    </div>

    <div id="main-content" style="display:none;">
      <div class="summary-card">
        <div class="summary-rows">
          <div class="summary-row">
            <span class="summary-label"><span class="dot red"></span>Zoom tabs</span>
            <span class="summary-value zero" id="zoom-val">0</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><span class="dot amber"></span>Duplicate tabs</span>
            <span class="summary-value zero" id="dupe-val">0</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><span class="dot dim"></span>Empty tabs</span>
            <span class="summary-value zero" id="empty-val">0</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-row summary-total">
            <span>Tabs to close</span>
            <span class="val" id="total-val">0</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><span class="dot blue"></span>Reorder remaining by domain</span>
            <span class="summary-value active" style="font-size:12px;">✓</span>
          </div>
        </div>
        <div class="tab-list" id="tab-list" style="display:none;"></div>
      </div>

      <button class="action-btn disabled" id="clean-btn" disabled>Nothing to clean</button>
      <div class="success-message" id="success-msg">✓ Tabs cleaned &amp; reordered</div>
    </div>

    <div class="footer">One click to tidy everything</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
